<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Giới Thiệu Sản Phẩm</title>
    <style>
        img { max-width: 100%; height: auto; display: block; }
        figure { border: 1px solid #ddd; padding: 10px; width: 300px; display: inline-block; text-align: center; vertical-align: top; margin: 10px; }
        figcaption { font-weight: bold; margin-top: 8px; font-size: 14px; color: #333; }
        .media-section { margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>Showroom Xe Máy Điện VinFast</h1>

    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#1e3799" />
        <rect x="35" y="35" width="30" height="30" fill="white" />
    </svg>

    <div class="media-section">
        <h2>Hình ảnh sản phẩm nổi bật</h2>
        
        <figure>
            <img src="https://static.chotot.com/storage/chotot-kinhnghiem/xe/2025/11/6c86fb77-vinfast-evo-grand-lite-mau-lavender-sua.webp" alt="Xe máy điện VinFast Evo Grand Lite màu Lavender sữa" loading="lazy">
            <figcaption>VinFast Evo Grand Lite (Lavender Sữa)</figcaption>
        </figure>

        <figure>
            <img src="https://xedienvietthanh.com/wp-content/uploads/2022/11/xe-may-dien-vinfast-evo-200-den.jpg" alt="Xe máy điện VinFast Evo 200 màu Đen" loading="lazy">
            <figcaption>VinFast Evo 200 (Màu Đen)</figcaption>
        </figure>

        <figure>
            <img src="https://shop.vinfastauto.com/on/demandware.static/-/Sites-app_vinfast_vn-Library/default/dw78959a27/images/PDP-XMD/feliz/2025/img-top-feliz-sand.webp" alt="Xe máy điện VinFast Feliz màu Cát" loading="lazy">
            <figcaption>VinFast Feliz (Màu Cát - Sand)</figcaption>
        </figure>
    </div>

    <div class="media-section">
        <h2>Video Đánh giá xe thực tế (YouTube)</h2>
        <iframe width="640" height="360" src="https://www.youtube.com/embed/dmeL90BedqY" title="So sánh VinFast Evo Grand Lite và Evo Lite Neo: Xe học sinh cùng phân khúc giá thì nên mua xe gì ?" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    </div>

    <div class="media-section">
        <h2>Video Hướng dẫn Điều khiển</h2>
        <video controls poster="poster-image.jpg" width="600">
            <source src="7888011336157.mp4" type="video/mp4">
            <source src="tutorial.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </div>

    <div class="media-section">
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="Don Toliver - Lose My Mind (feat. Doja Cat) From F1 The Movie Official Music Video.mp3" type="audio/mpeg">
            <source src="background-music.ogg" type="audio/ogg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </div>
</body>
</html>
