<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <style>
        fieldset { margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        input, select, textarea { width: 300px; padding: 5px; }
        input[type="radio"], input[type="checkbox"] { width: auto; }
    </style>
</head>
<body>
    <h2>Đăng Ký Tài Khoản E-Commerce</h2>
    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div class="form-group">
                <label for="fullname">Họ và tên:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ và tên">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required placeholder="VD: 0912345678" title="Vui lòng nhập 10 chữ số">
            </div>
            <div class="form-group">
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-06-01" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" pattern="^[a-zA-Z0-9_]{3,20}$" required placeholder="Tên đăng nhập" title="Chỉ chứa chữ, số, underscore (3-20 ký tự)">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Mật khẩu" title="Ít nhất 8 ký tự, có 1 chữ hoa và 1 số">
            </div>
            <div class="form-group">
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div class="form-group">
                <label for="city">Thành phố:</label>
                <select id="city" name="city" required>
                    <option value="" disabled selected>Chọn Tỉnh/Thành</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>
            <div class="form-group">
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district" required>
                    <option value="" disabled selected>Chọn Quận/Huyện</option>
                    <option value="q1">Quận Đống Đa</option>
                    <option value="q2">Quận Cầu Giấy</option>
                    <option value="q3">Quận Hai Bà Trưng</option>
                </select>
            </div>
            <div class="form-group">
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" required placeholder="Số nhà, tên đường..."></textarea>
            </div>
            <div class="form-group">
                <label>Giới tính:</label>
                <input type="radio" id="gender_male" name="gender" value="nam" required>
                <label for="gender_male" style="width: auto;">Nam</label>
                <input type="radio" id="gender_female" name="gender" value="nu">
                <label for="gender_female" style="width: auto;">Nữ</label>
                <input type="radio" id="gender_other" name="gender" value="khac">
                <label for="gender_other" style="width: auto;">Khác</label>
            </div>
        </fieldset>

        <div class="form-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="width: auto;">Tôi đồng ý với các điều khoản và dịch vụ</label>
        </div>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>
    </form>
</body>
</html>
